        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            
            document.getElementById('questionNumber').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('questionCounter').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
            document.getElementById('scoreDisplay').textContent = `Aciertos: ${score}/${currentQuestion}`;
            document.getElementById('progressBar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.onclick = () => selectOption(index);
                optionDiv.innerHTML = `
                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                    <div class="option-text">${option}</div>
                `;
                optionsContainer.appendChild(optionDiv);
            });
            
            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('nextButton').classList.remove('show');
        }

        function selectOption(selectedIndex) {
            if (answered) return;
            
            answered = true;
            const q = questions[currentQuestion];
            const options = document.querySelectorAll('.option');
            
            options.forEach((option, index) => {
                option.classList.add('disabled');
                if (index === q.correct) {
                    option.classList.add('correct');
                }
                if (index === selectedIndex && index !== q.correct) {
                    option.classList.add('incorrect');
                }
                if (index === selectedIndex) {
                    option.classList.add('selected');
                }
            });
            
            const isCorrect = selectedIndex === q.correct;
            if (isCorrect) score++;
            
            const feedback = document.getElementById('feedback');
            feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
            document.getElementById('feedbackTitle').textContent = isCorrect ? '✅ ¡Correcto!' : '❌ Incorrecto';
            document.getElementById('feedbackText').innerHTML = q.explanation;
            
            document.getElementById('nextButton').classList.add('show');
            document.getElementById('scoreDisplay').textContent = `Aciertos: ${score}/${currentQuestion + 1}`;
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('progressContainer').style.display = 'none';
            document.getElementById('questionCard').style.display = 'none';
            
            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.classList.add('show');
            
            const percentage = ((score / questions.length) * 100).toFixed(1);
            document.getElementById('finalScore').textContent = `${score} / ${questions.length}`;
            document.getElementById('finalPercentage').textContent = `${percentage}% de aciertos`;
            
            let message = '';
            if (percentage >= 90) {
                message = '¡Excelente dominio de los planos de construcción del programa analítico! Demuestras un conocimiento sobresaliente de la Nueva Escuela Mexicana.';
            } else if (percentage >= 80) {
                message = '¡Muy buen trabajo! Tienes un sólido entendimiento de los planos de contextualización, metodológico y codiseño de contenidos.';
            } else if (percentage >= 70) {
                message = 'Buen desempeño. Te recomendamos revisar las diferencias entre los tres planos para fortalecer tu comprensión.';
            } else {
                message = 'Te sugerimos revisar el material "Un libro sin recetas para la maestra y el maestro" páginas 68-76 para profundizar en los planos de construcción del programa analítico.';
            }
            
            document.getElementById('resultsMessage').textContent = message;
        }

        function restartSimulator() {
            currentQuestion = 0;
            score = 0;
            answered = false;
            
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('questionCard').style.display = 'block';
            document.getElementById('resultsContainer').classList.remove('show');
            
            loadQuestion();
        }

        document.getElementById('nextButton').addEventListener('click', nextQuestion);

        // Inicializar
        loadQuestion();
    </script>
